services:
  - type: web
    name: cloudflow-rms
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "1"
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://clzejlctefubujvnwale.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: Restaurant Management System
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: USDA_API_KEY
        value: DEMO_KEY
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
